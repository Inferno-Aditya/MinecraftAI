<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MinecraftAI — Tool Explorer</title>
  <meta name="description" content="Interactive explorer for every tool registered in the MinecraftAI Tool Registry. Browse, search, and inspect all AI assistant tools.">
  <style>
    /* ============================================================
       DESIGN TOKENS — Minecraft-Inspired Dark Stone Palette
       ============================================================ */
    :root {
      /* Stone palette */
      --bg-primary:      #1a1a2e;
      --bg-secondary:    #16213e;
      --bg-card:         #1e293b;
      --bg-card-hover:   #243348;
      --bg-sidebar:      #0f172a;
      --bg-nav:          #0d1117;
      --bg-input:        #1e293b;
      --bg-badge:        rgba(76, 175, 80, 0.15);

      /* Creeper green highlights */
      --green-primary:   #4caf50;
      --green-bright:    #66bb6a;
      --green-dark:      #388e3c;
      --green-glow:      rgba(76, 175, 80, 0.3);
      --green-dim:       rgba(76, 175, 80, 0.08);

      /* Redstone red for warnings */
      --red-primary:     #e53935;
      --red-glow:        rgba(229, 57, 53, 0.3);

      /* Gold for accents */
      --gold:            #ffb300;
      --gold-dim:        rgba(255, 179, 0, 0.12);

      /* Diamond blue */
      --blue-primary:    #42a5f5;
      --blue-dim:        rgba(66, 165, 245, 0.12);

      /* Purple for memory */
      --purple:          #ab47bc;
      --purple-dim:      rgba(171, 71, 188, 0.12);

      /* Text */
      --text-primary:    #e2e8f0;
      --text-secondary:  #94a3b8;
      --text-muted:      #64748b;
      --text-code:       #a5d6a7;

      /* Borders & misc */
      --border-color:    #2d3748;
      --border-subtle:   rgba(255,255,255,0.06);
      --shadow-card:     0 4px 24px rgba(0,0,0,0.35);
      --shadow-glow:     0 0 20px rgba(76,175,80,0.15);
      --radius-sm:       6px;
      --radius-md:       10px;
      --radius-lg:       14px;
      --transition:      0.25s cubic-bezier(0.4, 0, 0.2, 1);

      /* Layout */
      --sidebar-width:   280px;
      --nav-height:      64px;
    }

    /* ============================================================
       RESET & BASE
       ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* Subtle pixel-grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
      background-size: 16px 16px;
      pointer-events: none;
      z-index: 0;
    }

    a { color: var(--green-primary); text-decoration: none; }
    a:hover { text-decoration: underline; }
    code, pre {
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 0.85em;
    }

    /* ============================================================
       SCROLLBAR
       ============================================================ */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-secondary); }
    ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--green-dark); }

    /* ============================================================
       TOP NAVIGATION
       ============================================================ */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-height);
      background: var(--bg-nav);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 20px;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .navbar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .navbar-logo .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--green-primary), var(--green-dark));
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 12px var(--green-glow);
    }
    .navbar-logo h1 {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .navbar-logo h1 span { color: var(--green-primary); }

    .navbar-search {
      flex: 1;
      max-width: 480px;
      position: relative;
    }
    .navbar-search input {
      width: 100%;
      padding: 10px 14px 10px 40px;
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 0.9rem;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .navbar-search input::placeholder { color: var(--text-muted); }
    .navbar-search input:focus {
      border-color: var(--green-primary);
      box-shadow: 0 0 0 3px var(--green-glow);
    }
    .navbar-search .search-icon {
      position: absolute;
      left: 13px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 15px;
      pointer-events: none;
    }

    .navbar-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
      margin-left: auto;
    }
    .meta-badge {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .meta-badge.version {
      background: var(--green-dim);
      color: var(--green-bright);
      border: 1px solid rgba(76,175,80,0.2);
    }
    .meta-badge.count {
      background: var(--blue-dim);
      color: var(--blue-primary);
      border: 1px solid rgba(66,165,245,0.2);
    }

    /* ============================================================
       LAYOUT
       ============================================================ */
    .app-layout {
      display: flex;
      margin-top: var(--nav-height);
      min-height: calc(100vh - var(--nav-height));
      position: relative;
      z-index: 1;
    }

    /* ============================================================
       SIDEBAR
       ============================================================ */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border-color);
      position: fixed;
      top: var(--nav-height);
      bottom: 0;
      left: 0;
      overflow-y: auto;
      padding: 20px 0;
      z-index: 50;
    }

    .sidebar-section {
      padding: 0 16px;
      margin-bottom: 24px;
    }
    .sidebar-section-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      padding: 0 12px;
      margin-bottom: 8px;
    }

    .category-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 12px;
      background: transparent;
      border: none;
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-size: 0.88rem;
      cursor: pointer;
      transition: all var(--transition);
      text-align: left;
    }
    .category-btn:hover {
      background: rgba(76,175,80,0.08);
      color: var(--text-primary);
    }
    .category-btn.active {
      background: rgba(76,175,80,0.12);
      color: var(--green-bright);
      font-weight: 600;
    }
    .category-btn .cat-icon {
      width: 28px; height: 28px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .category-btn .cat-count {
      margin-left: auto;
      background: var(--bg-card);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--text-muted);
    }
    .category-btn.active .cat-count {
      background: rgba(76,175,80,0.2);
      color: var(--green-bright);
    }

    /* Category-specific colors */
    .cat-player .cat-icon   { background: var(--blue-dim); color: var(--blue-primary); }
    .cat-environment .cat-icon { background: var(--gold-dim); color: var(--gold); }
    .cat-world .cat-icon    { background: var(--green-dim); color: var(--green-primary); }
    .cat-memory .cat-icon   { background: var(--purple-dim); color: var(--purple); }

    /* Sidebar stats */
    .sidebar-stats {
      padding: 0 16px;
      margin-top: 8px;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      margin-bottom: 10px;
    }
    .stat-card .stat-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .stat-card .stat-value {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--green-bright);
    }
    .stat-card .stat-sub {
      font-size: 0.78rem;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    /* ============================================================
       MAIN PANEL
       ============================================================ */
    .main-panel {
      margin-left: var(--sidebar-width);
      flex: 1;
      padding: 28px 32px;
      min-width: 0;
    }

    .main-header {
      margin-bottom: 24px;
    }
    .main-header h2 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .main-header h2 .header-icon { margin-right: 8px; }
    .main-header p {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .results-info {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .results-info .result-count { color: var(--green-primary); font-weight: 600; }

    /* ============================================================
       TOOL CARDS GRID
       ============================================================ */
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 18px;
    }

    .tool-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 0;
      cursor: pointer;
      transition: all var(--transition);
      overflow: hidden;
      position: relative;
    }
    .tool-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 4px; height: 100%;
      border-radius: var(--radius-lg) 0 0 var(--radius-lg);
      transition: background var(--transition);
    }
    .tool-card:hover {
      border-color: var(--green-primary);
      box-shadow: var(--shadow-glow);
      transform: translateY(-2px);
    }
    .tool-card.expanded {
      border-color: var(--green-primary);
      box-shadow: var(--shadow-glow);
    }

    /* Category stripe colors */
    .tool-card.cat-player::before      { background: var(--blue-primary); }
    .tool-card.cat-environment::before { background: var(--gold); }
    .tool-card.cat-world::before       { background: var(--green-primary); }
    .tool-card.cat-memory::before      { background: var(--purple); }

    .card-header {
      padding: 18px 20px 14px 28px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .card-icon {
      width: 40px; height: 40px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .cat-player .card-icon      { background: var(--blue-dim); color: var(--blue-primary); }
    .cat-environment .card-icon { background: var(--gold-dim); color: var(--gold); }
    .cat-world .card-icon       { background: var(--green-dim); color: var(--green-primary); }
    .cat-memory .card-icon      { background: var(--purple-dim); color: var(--purple); }

    .card-info { flex: 1; min-width: 0; }
    .card-name {
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      color: var(--text-primary);
      word-break: break-all;
    }
    .card-category-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-top: 4px;
    }
    .cat-player .card-category-badge      { background: var(--blue-dim); color: var(--blue-primary); }
    .cat-environment .card-category-badge { background: var(--gold-dim); color: var(--gold); }
    .cat-world .card-category-badge       { background: var(--green-dim); color: var(--green-primary); }
    .cat-memory .card-category-badge      { background: var(--purple-dim); color: var(--purple); }

    .card-expand-icon {
      color: var(--text-muted);
      font-size: 18px;
      transition: transform var(--transition);
      flex-shrink: 0;
      margin-top: 4px;
    }
    .tool-card.expanded .card-expand-icon { transform: rotate(180deg); }

    .card-description {
      padding: 0 20px 14px 28px;
      font-size: 0.88rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .card-tags {
      padding: 0 20px 16px 28px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .tag {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.7rem;
      background: var(--bg-secondary);
      color: var(--text-muted);
      border: 1px solid var(--border-subtle);
    }

    /* ============================================================
       EXPANDED DETAIL PANEL
       ============================================================ */
    .card-detail {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease, opacity 0.3s ease;
      opacity: 0;
    }
    .tool-card.expanded .card-detail {
      max-height: 3000px;
      opacity: 1;
    }

    .detail-inner {
      padding: 0 20px 20px 28px;
      border-top: 1px solid var(--border-color);
      margin-top: 0;
      padding-top: 16px;
    }

    .detail-section {
      margin-bottom: 18px;
    }
    .detail-section:last-child { margin-bottom: 0; }
    .detail-section-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Parameters table */
    .params-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }
    .params-table th {
      text-align: left;
      padding: 6px 10px;
      background: var(--bg-secondary);
      color: var(--text-muted);
      font-weight: 600;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-bottom: 1px solid var(--border-color);
    }
    .params-table td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border-subtle);
      color: var(--text-secondary);
      vertical-align: top;
    }
    .params-table td:first-child {
      font-family: 'Cascadia Code', monospace;
      color: var(--text-code);
      white-space: nowrap;
    }
    .params-table .required-badge {
      display: inline-block;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 0.65rem;
      font-weight: 700;
    }
    .required-badge.yes { background: rgba(229,57,53,0.15); color: var(--red-primary); }
    .required-badge.no { background: rgba(100,116,139,0.15); color: var(--text-muted); }

    .no-params {
      color: var(--text-muted);
      font-style: italic;
      font-size: 0.85rem;
    }

    /* Output schema */
    .schema-block {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-size: 0.8rem;
      overflow-x: auto;
      max-height: 300px;
      overflow-y: auto;
    }
    .schema-block pre {
      color: var(--text-code);
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Examples */
    .example-block {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      padding: 14px;
      margin-bottom: 10px;
    }
    .example-block:last-child { margin-bottom: 0; }
    .example-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    .example-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 4px;
      margin-top: 8px;
    }
    .example-label:first-of-type { margin-top: 0; }
    .example-code {
      background: var(--bg-primary);
      border-radius: 4px;
      padding: 8px 10px;
      font-size: 0.78rem;
      color: var(--text-code);
      overflow-x: auto;
    }
    .example-code pre { white-space: pre-wrap; word-break: break-word; }

    /* Usage phrases */
    .usage-list {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .usage-list li {
      padding: 4px 10px;
      background: var(--green-dim);
      border: 1px solid rgba(76,175,80,0.15);
      border-radius: 20px;
      font-size: 0.78rem;
      color: var(--green-bright);
      font-style: italic;
    }

    /* Source link */
    .source-link {
      font-family: 'Cascadia Code', monospace;
      font-size: 0.8rem;
      color: var(--green-primary);
      text-decoration: none;
    }
    .source-link:hover { text-decoration: underline; }

    /* ============================================================
       EMPTY STATE
       ============================================================ */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
    }
    .empty-state .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }
    .empty-state h3 {
      font-size: 1.2rem;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .empty-state p {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* ============================================================
       RESPONSIVE
       ============================================================ */
    @media (max-width: 900px) {
      .sidebar { display: none; }
      .main-panel { margin-left: 0; }
      .tools-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 600px) {
      .navbar { padding: 0 12px; gap: 10px; }
      .navbar-logo h1 { display: none; }
      .navbar-meta .meta-badge.version { display: none; }
      .main-panel { padding: 16px; }
    }

    /* ============================================================
       LOADING SPINNER
       ============================================================ */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 100px 20px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border-color);
      border-top-color: var(--green-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p {
      margin-top: 16px;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* ============================================================
       ANIMATIONS
       ============================================================ */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .tool-card {
      animation: fadeInUp 0.3s ease both;
    }
  </style>
</head>
<body>

  <!-- ============================================================
       TOP NAVIGATION
       ============================================================ -->
  <nav class="navbar" id="navbar">
    <div class="navbar-logo">
      <div class="logo-icon">⛏️</div>
      <h1>Minecraft<span>AI</span></h1>
    </div>
    <div class="navbar-search">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search tools by name, description, category, parameter, or tag..." autocomplete="off">
    </div>
    <div class="navbar-meta">
      <span class="meta-badge version" id="versionBadge">v—</span>
      <span class="meta-badge count" id="toolCountBadge">— tools</span>
    </div>
  </nav>

  <!-- ============================================================
       APP LAYOUT
       ============================================================ -->
  <div class="app-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-section-title">Categories</div>
        <div id="categoryList"></div>
      </div>

      <div class="sidebar-section sidebar-stats" id="statsPanel">
        <div class="sidebar-section-title">Statistics</div>
        <!-- Populated dynamically -->
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main-panel" id="mainPanel">
      <div class="loading" id="loadingState">
        <div class="spinner"></div>
        <p>Loading Tool Registry…</p>
      </div>
    </main>
  </div>

  <!-- ============================================================
       JAVASCRIPT — Standalone Tool Explorer Engine
       ============================================================ -->
  <script>
    /**
     * MinecraftAI Tool Explorer
     * =========================
     * Loads tools.json dynamically and renders an interactive,
     * searchable, filterable tool explorer. No dependencies.
     * Designed for future migration to a React dashboard.
     */

    // ── State ─────────────────────────────────────────────────────
    let toolsData = null;      // Raw JSON data
    let allTools = [];         // Flat tool array
    let activeCategory = null; // null = All
    let searchQuery = '';

    // ── Category Metadata ─────────────────────────────────────────
    const CATEGORY_META = {
      Player:      { icon: '🧑', cssClass: 'cat-player',      cardIcon: '🎮' },
      Environment: { icon: '🌍', cssClass: 'cat-environment', cardIcon: '🌤️' },
      World:       { icon: '🗺️', cssClass: 'cat-world',       cardIcon: '🧱' },
      Memory:      { icon: '💾', cssClass: 'cat-memory',       cardIcon: '📝' },
      Utility:     { icon: '🔧', cssClass: 'cat-utility',      cardIcon: '⚙️' },
      Future:      { icon: '🚀', cssClass: 'cat-future',       cardIcon: '🔮' }
    };

    // ── Initialization ────────────────────────────────────────────

    document.addEventListener('DOMContentLoaded', init);

    async function init() {
      try {
        toolsData = await loadToolsJSON();
        allTools = toolsData.tools || [];
        renderNavMeta();
        renderSidebar();
        renderStats();
        renderMainPanel();
        bindSearch();
      } catch (err) {
        showError(err);
      }
    }

    /**
     * Load tools.json from the same directory as this HTML file.
     * Falls back to an embedded inline dataset if fetch fails.
     */
    async function loadToolsJSON() {
      try {
        const res = await fetch('./tools.json');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return await res.json();
      } catch (fetchErr) {
        console.warn('Could not fetch tools.json, using embedded data:', fetchErr.message);
        return getEmbeddedToolsData();
      }
    }

    // ── Navigation Meta ───────────────────────────────────────────

    function renderNavMeta() {
      document.getElementById('versionBadge').textContent = `v${toolsData.version || '0.0.0'}`;
      document.getElementById('toolCountBadge').textContent = `${allTools.length} tools`;
    }

    // ── Sidebar ───────────────────────────────────────────────────

    function renderSidebar() {
      const container = document.getElementById('categoryList');
      const counts = getCategoryCounts();

      // "All" button
      let html = `
        <button class="category-btn active" data-category="" onclick="setCategory(null, this)">
          <span class="cat-icon" style="background:var(--green-dim);color:var(--green-primary);">📋</span>
          <span>All Tools</span>
          <span class="cat-count">${allTools.length}</span>
        </button>
      `;

      // Category buttons
      for (const [cat, meta] of Object.entries(CATEGORY_META)) {
        const count = counts[cat] || 0;
        if (count === 0) continue;
        html += `
          <button class="category-btn ${meta.cssClass}" data-category="${cat}" onclick="setCategory('${cat}', this)">
            <span class="cat-icon">${meta.icon}</span>
            <span>${cat}</span>
            <span class="cat-count">${count}</span>
          </button>
        `;
      }

      container.innerHTML = html;
    }

    function getCategoryCounts() {
      const counts = {};
      allTools.forEach(t => {
        counts[t.category] = (counts[t.category] || 0) + 1;
      });
      return counts;
    }

    function setCategory(category, btn) {
      activeCategory = category;

      // Update active state
      document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');

      renderMainPanel();
    }

    // ── Statistics ─────────────────────────────────────────────────

    function renderStats() {
      const panel = document.getElementById('statsPanel');
      const categories = Object.keys(getCategoryCounts());
      const avgParams = allTools.length > 0
        ? (allTools.reduce((sum, t) => sum + (t.parameters ? t.parameters.length : 0), 0) / allTools.length).toFixed(1)
        : '0';

      // Find newest tool (highest version)
      const newest = allTools.length > 0
        ? allTools.reduce((a, b) => (a.version > b.version ? a : b))
        : null;

      panel.innerHTML = `
        <div class="sidebar-section-title">Statistics</div>
        <div class="stat-card">
          <div class="stat-label">Total Tools</div>
          <div class="stat-value">${allTools.length}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Categories</div>
          <div class="stat-value">${categories.length}</div>
          <div class="stat-sub">${categories.join(' · ')}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Avg Parameters</div>
          <div class="stat-value">${avgParams}</div>
          <div class="stat-sub">per tool</div>
        </div>
        ${newest ? `
        <div class="stat-card">
          <div class="stat-label">Latest Phase</div>
          <div class="stat-value" style="font-size:1rem;">${newest.phase || 'N/A'}</div>
          <div class="stat-sub">${newest.name}</div>
        </div>` : ''}
        <div class="stat-card">
          <div class="stat-label">Project Version</div>
          <div class="stat-value">${toolsData.version || 'N/A'}</div>
        </div>
      `;
    }

    // ── Search ─────────────────────────────────────────────────────

    function bindSearch() {
      const input = document.getElementById('searchInput');
      input.addEventListener('input', (e) => {
        searchQuery = e.target.value.trim().toLowerCase();
        renderMainPanel();
      });
    }

    // ── Main Panel ─────────────────────────────────────────────────

    function renderMainPanel() {
      const panel = document.getElementById('mainPanel');
      const filtered = getFilteredTools();

      // Remove loading
      const loading = document.getElementById('loadingState');
      if (loading) loading.remove();

      // Header
      const catTitle = activeCategory || 'All Tools';
      const catMeta = CATEGORY_META[activeCategory] || { icon: '📋' };

      let html = `
        <div class="main-header">
          <h2><span class="header-icon">${catMeta.icon || '📋'}</span>${catTitle}</h2>
          <p>${activeCategory && toolsData.categories && toolsData.categories[activeCategory]
            ? toolsData.categories[activeCategory].description
            : 'Browse and search all registered tools in the MinecraftAI Tool Registry.'}</p>
        </div>
        <div class="results-info">
          <span>Showing <span class="result-count">${filtered.length}</span> of ${allTools.length} tools</span>
          ${searchQuery ? `<span>· Filtered by "<strong>${escapeHTML(searchQuery)}</strong>"</span>` : ''}
        </div>
      `;

      if (filtered.length === 0) {
        html += `
          <div class="empty-state">
            <div class="empty-icon">🔍</div>
            <h3>No tools found</h3>
            <p>Try adjusting your search query or selecting a different category.</p>
          </div>
        `;
      } else {
        html += '<div class="tools-grid">';
        filtered.forEach((tool, idx) => {
          html += renderToolCard(tool, idx);
        });
        html += '</div>';
      }

      panel.innerHTML = html;
    }

    function getFilteredTools() {
      return allTools.filter(tool => {
        // Category filter
        if (activeCategory && tool.category !== activeCategory) return false;

        // Search filter
        if (searchQuery) {
          const searchFields = [
            tool.name,
            tool.description,
            tool.category,
            ...(tool.tags || []),
            ...(tool.parameters || []).map(p => p.name + ' ' + (p.description || '')),
            ...(tool.usage_examples || [])
          ].join(' ').toLowerCase();

          return searchFields.includes(searchQuery);
        }

        return true;
      });
    }

    // ── Tool Card Rendering ────────────────────────────────────────

    function renderToolCard(tool, index) {
      const meta = CATEGORY_META[tool.category] || { cssClass: '', cardIcon: '📦' };
      const paramCount = tool.parameters ? tool.parameters.length : 0;

      return `
        <div class="tool-card ${meta.cssClass}" id="card-${index}" onclick="toggleCard(${index})" style="animation-delay: ${index * 0.04}s">
          <div class="card-header">
            <div class="card-icon">${meta.cardIcon}</div>
            <div class="card-info">
              <div class="card-name">${escapeHTML(tool.name)}</div>
              <span class="card-category-badge">${escapeHTML(tool.category)}</span>
            </div>
            <span class="card-expand-icon">▼</span>
          </div>
          <div class="card-description">${escapeHTML(tool.description)}</div>
          <div class="card-tags">
            ${(tool.tags || []).map(t => `<span class="tag">${escapeHTML(t)}</span>`).join('')}
          </div>

          <!-- Expandable Detail -->
          <div class="card-detail">
            <div class="detail-inner">
              ${renderParameters(tool)}
              ${renderOutputSchema(tool)}
              ${renderExamples(tool)}
              ${renderUsagePhrases(tool)}
              ${renderSourceInfo(tool)}
            </div>
          </div>
        </div>
      `;
    }

    function renderParameters(tool) {
      const params = tool.parameters || [];
      if (params.length === 0) {
        return `
          <div class="detail-section">
            <div class="detail-section-title">⚙️ Input Parameters</div>
            <div class="no-params">No parameters required</div>
          </div>
        `;
      }

      let rows = params.map(p => `
        <tr>
          <td>${escapeHTML(p.name)}</td>
          <td>${escapeHTML(p.type)}</td>
          <td><span class="required-badge ${p.required ? 'yes' : 'no'}">${p.required ? 'Required' : 'Optional'}</span></td>
          <td>${p.default !== null && p.default !== undefined ? escapeHTML(String(p.default)) : '—'}</td>
          <td>${escapeHTML(p.description || '')}</td>
        </tr>
      `).join('');

      return `
        <div class="detail-section">
          <div class="detail-section-title">⚙️ Input Parameters</div>
          <table class="params-table">
            <thead><tr><th>Name</th><th>Type</th><th>Required</th><th>Default</th><th>Description</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      `;
    }

    function renderOutputSchema(tool) {
      if (!tool.returns) return '';
      return `
        <div class="detail-section">
          <div class="detail-section-title">📤 Output Schema</div>
          <div class="schema-block">
            <pre>${escapeHTML(JSON.stringify(tool.returns, null, 2))}</pre>
          </div>
        </div>
      `;
    }

    function renderExamples(tool) {
      const examples = tool.examples || [];
      if (examples.length === 0) return '';

      const blocks = examples.map(ex => `
        <div class="example-block">
          <div class="example-title">${escapeHTML(ex.description || 'Example')}</div>
          <div class="example-label">Request</div>
          <div class="example-code"><pre>${escapeHTML(JSON.stringify(ex.request, null, 2))}</pre></div>
          <div class="example-label">Response</div>
          <div class="example-code"><pre>${escapeHTML(JSON.stringify(ex.response, null, 2))}</pre></div>
        </div>
      `).join('');

      return `
        <div class="detail-section">
          <div class="detail-section-title">📎 Examples</div>
          ${blocks}
        </div>
      `;
    }

    function renderUsagePhrases(tool) {
      const phrases = tool.usage_examples || [];
      if (phrases.length === 0) return '';
      return `
        <div class="detail-section">
          <div class="detail-section-title">💬 Planner Trigger Phrases</div>
          <ul class="usage-list">
            ${phrases.map(p => `<li>"${escapeHTML(p)}"</li>`).join('')}
          </ul>
        </div>
      `;
    }

    function renderSourceInfo(tool) {
      return `
        <div class="detail-section">
          <div class="detail-section-title">📁 Source</div>
          <span class="source-link">${escapeHTML(tool.source || 'N/A')}</span>
          <span style="margin-left:12px;color:var(--text-muted);font-size:0.78rem;">v${escapeHTML(tool.version || 'N/A')}</span>
          ${tool.phase ? `<span style="margin-left:8px;color:var(--text-muted);font-size:0.78rem;">· ${escapeHTML(tool.phase)}</span>` : ''}
        </div>
      `;
    }

    // ── Card Toggle ────────────────────────────────────────────────

    function toggleCard(index) {
      const card = document.getElementById(`card-${index}`);
      if (card) card.classList.toggle('expanded');
    }

    // ── Utilities ──────────────────────────────────────────────────

    function escapeHTML(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function showError(err) {
      const panel = document.getElementById('mainPanel');
      panel.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon" style="color:var(--red-primary);">⚠️</div>
          <h3>Failed to Load Tools</h3>
          <p>${escapeHTML(err.message)}</p>
          <p style="margin-top:12px;color:var(--text-muted);font-size:0.82rem;">
            Make sure <code>tools.json</code> is in the same directory as this HTML file.
          </p>
        </div>
      `;
    }
